{% extends "forecast_app/base.html" %}
{% block content %}

<style>
.form-page { max-width: 1400px; margin: 24px auto; }
.form-card { background:#fff; border-radius:16px; padding:32px; box-shadow:0 12px 40px rgba(0,0,0,.08); }
.bulk-table { width:100%; border-collapse:separate; border-spacing:0 14px; }
.bulk-table th { font-size:13px; font-weight:600; color:#374151; padding:0 8px; }
.bulk-table td { padding:10px 8px; }
.form-control { border-radius:10px; padding:10px 12px; border:1px solid #d1d5db; }
.primary-btn { background:#ef4444; color:#fff; padding:10px 26px; border-radius:10px; }
.secondary-btn { background:#f3f4f6; padding:10px 22px; border-radius:10px; }
.remove-row { background:none; border:none; color:#ef4444; font-size:18px; cursor:pointer; }
</style>

<a href="{% url 'paytable' %}" class="font-semibold">← Back</a>

<div class="form-page">
  <div class="form-card">
    <h2 class="text-xl font-bold mb-2">Add Payables (Bulk Entry)</h2>
    <p class="text-gray-500 mb-4">Add multiple payable records at once</p>

    <form method="post" action="{% url 'payform' %}">
      {% csrf_token %}

      <table class="bulk-table" id="payTable">
        <thead>
          <tr>
            <th>Party </th>
            <th>Amount </th>
            <th>Due Date </th>
            <th>Description</th>
            <th>Paid</th>
            <th class="paid-date-header" style="display:none;">Paid Date</th>
            <th></th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td><input type="text" name="party_name[]" class="form-control" required></td>
            <td><input type="number" step="0.01" name="amount[]" class="form-control" required></td>
            <td><input type="date" name="due_date[]" class="form-control" required></td>
            <td><input type="text" name="description[]" class="form-control"></td>
            <td class="text-center">
              <input type="checkbox" class="is-paid">
            </td>
            <td>
              <input type="date" name="paid_date[]" class="form-control paid-date"
                     style="display:none;" disabled>
            </td>
            <td>
              <button type="button" class="remove-row">×</button>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="flex justify-between mt-6">
        <button type="button" class="secondary-btn" id="addPayRow">+ Add Row</button>
        <button type="submit" class="primary-btn">Save All Payables</button>
      </div>
    </form>
  </div>
</div>

<script>
function updatePaidHeader() {
  const header = document.querySelector('.paid-date-header');
  const anyChecked = document.querySelectorAll('.is-paid:checked').length > 0;
  header.style.display = anyChecked ? 'table-cell' : 'none';
}

function togglePaid(row) {
  const checkbox = row.querySelector('.is-paid');
  const dateInput = row.querySelector('.paid-date');

  if (checkbox.checked) {
    dateInput.style.display = 'block';
    dateInput.disabled = false;
    dateInput.required = true;
  } else {
    dateInput.style.display = 'none';
    dateInput.disabled = true;
    dateInput.required = false;
    dateInput.value = '';
  }
  updatePaidHeader();
}

document.getElementById('addPayRow').onclick = () => {
  const tbody = document.querySelector('#payTable tbody');
  const newRow = tbody.rows[0].cloneNode(true);

  newRow.querySelectorAll('input').forEach(i => {
    if (i.type === 'checkbox') i.checked = false;
    else i.value = '';
    if (i.classList.contains('paid-date')) {
      i.style.display = 'none';
      i.disabled = true;
      i.required = false;
    }
  });

  tbody.appendChild(newRow);
};

document.addEventListener('change', e => {
  if (e.target.classList.contains('is-paid')) {
    togglePaid(e.target.closest('tr'));
  }
});

document.addEventListener('click', e => {
  if (e.target.classList.contains('remove-row')) {
    const rows = document.querySelectorAll('#payTable tbody tr');
    if (rows.length > 1) e.target.closest('tr').remove();
    updatePaidHeader();
  }
});

document.addEventListener('DOMContentLoaded', updatePaidHeader);
</script>

{% endblock %}
