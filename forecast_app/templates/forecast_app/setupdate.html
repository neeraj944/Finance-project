{% extends 'forecast_app/base.html' %}
{% block content %}

<!-- Header -->
<div class="flex justify-between items-center mb-6">
    <div>
        <h2 class="text-3xl font-bold text-gray-800">Update Settings</h2>
        <p class="text-gray-500 mt-1">Modify forecast configuration</p>
    </div>

    <a href="{% url 'settable' %}"
       class="px-4 py-2 bg-gray-700 text-white rounded-lg hover:bg-gray-800">
        ← Back to Settings
    </a>
</div>

<div class="flex justify-center">
    <div class="w-full max-w-xl bg-white rounded-xl shadow-md p-8">

        <form method="post" class="space-y-4">
            {% csrf_token %}

            {% for field in form %}
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    {{ field.label }}
                </label>
                {{ field }}
            </div>
            {% endfor %}

            <div class="flex justify-end gap-3 pt-4">
                <a href="{% url 'settable' %}"
                   class="px-5 py-2 bg-gray-200 rounded-lg">
                    Cancel
                </a>
                <button type="submit"
                        class="px-6 py-2 bg-green-600 text-white rounded-lg">
                    Update Settings
                </button>
            </div>
        </form>

    </div>
</div>

{% endblock %}
