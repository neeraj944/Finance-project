{% extends 'forecast_app/base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl p-8">

            <!-- Header -->
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-blue-600 mb-4">
                    <i class="fas fa-lock text-white text-2xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
                <p class="text-gray-500 mt-1">Login to your dashboard</p>
            </div>

            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 p-3 rounded-lg bg-red-50 border-l-4 border-red-500 text-red-700 text-sm">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- FORM -->
            <form method="POST" class="space-y-4">
                {% csrf_token %}

                <!-- USERNAME -->
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">
                        Username
                    </label>
                    <input
                        type="text"
                        name="username"
                        placeholder="Enter your username"
                        required
                        class="w-full px-4 py-2 rounded-lg border border-gray-300
                               focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    >
                </div>

                <!-- PASSWORD -->
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">
                        Password
                    </label>
                    <input
                        type="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                        class="w-full px-4 py-2 rounded-lg border border-gray-300
                               focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    >
                </div>

                <!-- BUTTON -->
                <button
                    type="submit"
                    class="w-full flex items-center justify-center gap-2 py-2.5
                           bg-blue-600 text-white rounded-lg hover:bg-blue-700
                           transition-all shadow-md font-semibold"
                >
                    <i class="fas fa-right-to-bracket"></i>
                    Login
                </button>
            </form>

            <!-- REGISTER -->
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-500">Don’t have an account?</p>
                <a href="{% url 'reg' %}"
                   class="inline-block mt-2 px-6 py-2 rounded-lg bg-gray-800
                          text-white hover:bg-gray-900 transition-all shadow">
                    Create Account
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% block bar %}{% endblock %}
