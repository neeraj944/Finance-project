{% extends 'forecast_app/base.html' %}
{% block content %}

<div class="flex justify-center mt-4">
    <div class="w-full max-w-xl">

        <!-- Back Button -->
        <a href="{% url 'extable' %}"
           class="inline-flex items-center mb-4 px-4 py-2 rounded-md bg-gray-700 text-white hover:bg-gray-800">
            ← Return to Expense List
        </a>

        <!-- Form Card -->
        <div class="bg-white rounded-xl shadow-md p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
                Update Expense
            </h2>

            <form method="post" class="space-y-4">
                {% csrf_token %}

                <!-- Amount -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Amount</label>
                    <input type="number" name="amount" value="{{ expr.amount }}"
                           class="w-full rounded-lg border-2 border-gray-300 px-3 py-2
                                  focus:border-green-600 focus:outline-none">
                </div>

                <!-- Date -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Date</label>
                    <input type="date" name="date" value="{{ expr.date }}"
                           class="w-full rounded-lg border-2 border-gray-300 px-3 py-2
                                  focus:border-green-600 focus:outline-none">
                </div>

                <!-- Category -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Category</label>
                    <input type="text" name="category_name" value="{{ expr.category_name }}"
                           class="w-full rounded-lg border-2 border-gray-300 px-3 py-2
                                  focus:border-green-600 focus:outline-none">
                </div>

                <!-- Category Type -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Category Type</label>
                    <input type="text" name="category_type" value="{{ expr.category_type }}"
                           class="w-full rounded-lg border-2 border-gray-300 px-3 py-2
                                  focus:border-green-600 focus:outline-none">
                </div>

                <!-- Payment Mode -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Payment Mode</label>
                    <input type="text" name="payment_mode" value="{{ expr.payment_mode }}"
                           class="w-full rounded-lg border-2 border-gray-300 px-3 py-2
                                  focus:border-green-600 focus:outline-none">
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Description</label>
                    <input type="text" name="description" value="{{ expr.description }}"
                           class="w-full rounded-lg border-2 border-gray-300 px-3 py-2
                                  focus:border-green-600 focus:outline-none">
                </div>

                <!-- Buttons -->
                <div class="flex justify-end gap-3 pt-4">
                    <a href="{% url 'extable' %}"
                       class="px-4 py-2 rounded-md bg-gray-200 text-gray-700 hover:bg-gray-300">
                        Cancel
                    </a>
                    <button type="submit"
                            class="px-5 py-2 rounded-md bg-green-600 text-white hover:bg-green-700">
                        Update
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
