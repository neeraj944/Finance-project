{% extends "forecast_app/base.html" %}
{% block content %}

<style>
.form-page{max-width:1100px;margin:24px auto;}
.form-card{
  background:#fff;
  border-radius:16px;
  padding:32px;
  box-shadow:0 12px 40px rgba(0,0,0,.08);
}

/* Header */
.form-header h2{font-size:22px;font-weight:700;margin:0;}
.form-header p{color:#6b7280;margin-top:4px;font-size:14px;}

/* Table */
.bulk-table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 14px;
}
.bulk-table thead th{
  font-size:13px;
  font-weight:600;
  color:#374151;
  padding:0 8px;
  border:none;
}
.bulk-table tbody tr{
  background:#f9fafb;
}
.bulk-table tbody td{
  padding:10px 8px;
  border:none;
}
.bulk-table tbody tr td:first-child{
  border-radius:12px 0 0 12px;
}
.bulk-table tbody tr td:last-child{
  border-radius:0 12px 12px 0;
}

/* Inputs */
.form-control,.form-select{
  border-radius:10px;
  border:1px solid #d1d5db;
  padding:10px 12px;
  font-size:14px;
}
.form-control:focus,.form-select:focus{
  border-color:#ef4444;
  box-shadow:0 0 0 2px rgba(239,68,68,.15);
}

/* Buttons */
.primary-btn{
  background:#ef4444;
  color:#fff;
  border:none;
  padding:10px 26px;
  border-radius:10px;
  font-weight:600;
}
.primary-btn:hover{background:#dc2626;}
.secondary-btn{
  background:#f3f4f6;
  border:none;
  padding:10px 22px;
  border-radius:10px;
  font-weight:600;
}
.remove-row{
  background:none;
  border:none;
  color:#ef4444;
  font-size:18px;
  cursor:pointer;
}

/* Footer */
.form-actions{
  display:flex;
  justify-content:space-between;
  margin-top:28px;
}
</style>

<a href="{% url 'expense_list' %}" class="mb-3 d-inline-block fw-semibold">← Back</a>

<div class="form-page">
  <div class="form-card">

    <div class="form-header mb-4">
      <h2>Add Expense (Bulk Entry)</h2>
      <p>Add multiple expense records at once</p>
    </div>

    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}

    <form method="post">
      {% csrf_token %}

      <table class="bulk-table" id="expenseTable">
        <thead>
          <tr>
            <th>Amount *</th>
            <th>Category *</th>
            <th>Payment Mode *</th>
            <th>Date *</th>
            <th>Description</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
  <input type="number" step="0.01" name="amount[]" class="form-control amount-input" required>
</td>

            <td>
              <select name="category[]" class="form-select" required>
                <option value="">Select</option>
                {% for cat in categories %}
                  <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
              </select>
            </td>
            <td>
              <select name="payment_mode[]" class="form-select" required>
                <option value="">Select</option>
                {% for pm in payment_modes %}
                  <option value="{{ pm.id }}">{{ pm.name }}</option>
                {% endfor %}
              </select>
            </td>
            <td><input type="date" name="date[]" class="form-control" required></td>
            <td><input type="text" name="description[]" class="form-control"></td>
            <td class="text-center">
              <button type="button" class="remove-row">×</button>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="flex justify-end mb-4">
  <h3 class="text-lg font-semibold">
    Total Amount: ₹
    <span id="totalAmount">0</span>
  </h3>
</div>


      <div class="form-actions">
        <button type="button" class="secondary-btn" id="addRow">+ Add Row</button>
        <button type="submit" class="primary-btn">Save All Expense</button>
      </div>
    </form>
  </div>
</div>

<script>
  function calculateTotal() {
    let total = 0;

    document.querySelectorAll('.amount-input').forEach(input => {
      const val = parseFloat(input.value);
      if (!isNaN(val)) {
        total += val;
      }
    });

    document.getElementById('totalAmount').innerText = total.toFixed(2);
  }

  // Add new row
  document.getElementById('addRow').addEventListener('click', function () {
    const tbody = document.querySelector('#expenseTable tbody');
    const row = tbody.rows[0].cloneNode(true);

    row.querySelectorAll('input, select').forEach(el => el.value = '');
    tbody.appendChild(row);

    calculateTotal();
  });

  // Remove row
  document.addEventListener('click', function (e) {
    if (e.target.classList.contains('remove-row')) {
      const rows = document.querySelectorAll('#expenseTable tbody tr');
      if (rows.length > 1) {
        e.target.closest('tr').remove();
        calculateTotal();
      }
    }
  });

  // Recalculate on typing
  document.addEventListener('input', function (e) {
    if (e.target.classList.contains('amount-input')) {
      calculateTotal();
    }
  });

  // Initial calculation (if values are prefilled)
  document.addEventListener('DOMContentLoaded', calculateTotal);
</script>


{% endblock %}
