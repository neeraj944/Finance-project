{% extends 'forecast_app/base.html' %}
{% block content %}

<!-- Header -->
<div class="mb-8">
    <h2 class="text-3xl font-bold text-gray-800">Receivables & Payables</h2>
    <p class="text-gray-500 mt-1">
        Manage incoming and outgoing dues efficiently
    </p>
</div>

<!-- Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">

    <!-- Receivables -->
    <a href="{% url 'rectable' %}"
       class="bg-white rounded-xl shadow-md p-8 hover:shadow-lg transition-all group">

        <div class="flex items-center justify-between mb-6">
            <div class="bg-green-500 p-4 rounded-xl">
                <i class="fas fa-arrow-trend-up text-white text-3xl"></i>
            </div>
        </div>

        <h3 class="text-2xl font-bold text-gray-800 mb-2">
            Receivables
        </h3>
        <p class="text-gray-500">
            Track money that customers owe you
        </p>

        <div class="mt-4 text-green-600 font-semibold group-hover:underline">
            View Receivables →
        </div>
    </a>

    <!-- Payables -->
    <a href="{% url 'paytable' %}"
       class="bg-white rounded-xl shadow-md p-8 hover:shadow-lg transition-all group">

        <div class="flex items-center justify-between mb-6">
            <div class="bg-red-500 p-4 rounded-xl">
                <i class="fas fa-arrow-trend-down text-white text-3xl"></i>
            </div>
        </div>

        <h3 class="text-2xl font-bold text-gray-800 mb-2">
            Payables
        </h3>
        <p class="text-gray-500">
            Track money you need to pay vendors
        </p>

        <div class="mt-4 text-red-600 font-semibold group-hover:underline">
            View Payables →
        </div>
    </a>

</div>

{% endblock %}
