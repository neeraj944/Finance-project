{% extends "forecast_app/base.html" %}
{% block content %}

<style>
/* Page layout */
.form-page {
  max-width: 1100px;
  margin: 24px auto;
}

/* Main card */
.form-card {
  background: #ffffff;
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 12px 40px rgba(0,0,0,.08);
}

/* Header */
.form-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.form-header h2 {
  font-size: 22px;
  font-weight: 700;
  margin: 0;
}

.form-header p {
  margin: 4px 0 0;
  color: #6b7280;
  font-size: 14px;
}

/* Table styling */
.bulk-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 14px;
}

.bulk-table thead th {
  font-size: 13px;
  font-weight: 600;
  color: #374151;
  border: none;
  padding: 0 8px;
}

.bulk-table tbody tr {
  background: #f9fafb;
  border-radius: 12px;
}

.bulk-table tbody td {
  border: none;
  padding: 10px 8px;
  vertical-align: middle;
}

.bulk-table tbody tr td:first-child {
  border-top-left-radius: 12px;
  border-bottom-left-radius: 12px;
}

.bulk-table tbody tr td:last-child {
  border-top-right-radius: 12px;
  border-bottom-right-radius: 12px;
}

/* Inputs */
.form-control,
.form-select {
  border-radius: 10px;
  border: 1px solid #d1d5db;
  padding: 10px 12px;
  font-size: 14px;
}

.form-control:focus,
.form-select:focus {
  border-color: #22c55e;
  box-shadow: 0 0 0 2px rgba(34,197,94,.15);
}

/* Buttons */
.primary-btn {
  background: #22c55e;
  color: #ffffff;
  border: none;
  padding: 10px 26px;
  border-radius: 10px;
  font-weight: 600;
}

.primary-btn:hover {
  background: #16a34a;
}

.secondary-btn {
  background: #f3f4f6;
  border: none;
  padding: 10px 22px;
  border-radius: 10px;
  font-weight: 600;
}

.remove-row {
  background: transparent;
  border: none;
  color: #ef4444;
  font-size: 18px;
  cursor: pointer;
}

/* Footer actions */
.form-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 28px;
}

/* Back link */
.back-link {
  display: inline-block;
  margin-bottom: 16px;
  font-weight: 600;
  color: #374151;
  text-decoration: none;
}

.back-link:hover {
  text-decoration: underline;
}
</style>

<a href="{% url 'income_list' %}" class="back-link">← Back</a>

<div class="form-page">
  <div class="form-card">

    <div class="form-header">
      <div>
        <h2>Add Income (Bulk Entry)</h2>
        <p>Add multiple income records at once</p>
      </div>
    </div>

    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}

    <form method="post">
      {% csrf_token %}

      <table class="bulk-table" id="incomeTable">
        <thead>
          <tr>
            <th>Amount *</th>
            <th>Category *</th>
            <th>Payment Mode *</th>
            <th>Date *</th>
            <th>Description</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <input type="number" step="0.01" name="amount[]" class="form-control amount-input" placeholder="0.00" required>

            </td>
            <td>
              <select name="category[]" class="form-select" required>
                <option value="">Select</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
              </select>
            </td>
            <td>
              <select name="payment_mode[]" class="form-select" required>
                <option value="">Select</option>
                {% for pm in payment_modes %}
                <option value="{{ pm.id }}">{{ pm.name }}</option>
                {% endfor %}
              </select>
            </td>
            <td>
              <input type="date" name="date[]" class="form-control" required>
            </td>
            <td>
              <input type="text" name="description[]" class="form-control" placeholder="Optional note">
            </td>
            <td class="text-center">
              <button type="button" class="remove-row">×</button>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="flex justify-end mb-3">
  <h3 class="text-lg font-semibold">
    Total Income: ₹
    <span id="totalIncome">0</span>
  </h3>
</div>

      <div class="form-actions">
        <button type="button" class="secondary-btn" id="addRow">+ Add Row</button>
        <button type="submit" class="primary-btn">Save All Income</button>
      </div>

    </form>
  </div>
</div>

<script>
  function calculateIncomeTotal() {
    let total = 0;

    document.querySelectorAll('.amount-input').forEach(input => {
      const value = parseFloat(input.value);
      if (!isNaN(value)) {
        total += value;
      }
    });

    document.getElementById('totalIncome').innerText = total.toFixed(2);
  }

  // Add row
  document.getElementById('addRow').addEventListener('click', function () {
    const tbody = document.querySelector('#incomeTable tbody');
    const newRow = tbody.rows[0].cloneNode(true);

    newRow.querySelectorAll('input, select').forEach(el => el.value = '');
    tbody.appendChild(newRow);

    calculateIncomeTotal();
  });

  // Remove row
  document.addEventListener('click', function (e) {
    if (e.target.classList.contains('remove-row')) {
      const rows = document.querySelectorAll('#incomeTable tbody tr');
      if (rows.length > 1) {
        e.target.closest('tr').remove();
        calculateIncomeTotal();
      }
    }
  });

  // Recalculate on input
  document.addEventListener('input', function (e) {
    if (e.target.classList.contains('amount-input')) {
      calculateIncomeTotal();
    }
  });

  // Initial calculation
  document.addEventListener('DOMContentLoaded', calculateIncomeTotal);
</script>

{% endblock %}
